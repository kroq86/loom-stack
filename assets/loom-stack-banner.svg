<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">Loom Stack</title>
  <desc id="desc">Composable Python packages for durable async agent loops</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1110"/>
      <stop offset="100%" stop-color="#171a18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a68437"/>
      <stop offset="50%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#a68437"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#2a302c" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect x="0" y="316" width="1280" height="4" fill="url(#gold)"/>
  <g transform="translate(72 72)" fill="none" stroke="#d4a853" stroke-width="5" stroke-linecap="round">
    <path d="M0 24 C36 0 84 0 120 24 C84 48 36 48 0 24 Z" opacity="0.95"/>
    <path d="M0 64 C36 40 84 40 120 64 C84 88 36 88 0 64 Z" opacity="0.75"/>
    <path d="M0 104 C36 80 84 80 120 104 C84 128 36 128 0 104 Z" opacity="0.55"/>
    <path d="M24 0 L24 128" stroke="#7ec8a8" stroke-width="3" opacity="0.7"/>
    <path d="M96 0 L96 128" stroke="#7ec8a8" stroke-width="3" opacity="0.7"/>
  </g>
  <text x="220" y="118" fill="#e8ece9" font-family="Georgia, serif" font-size="56" font-weight="700">Loom Stack</text>
  <text x="222" y="158" fill="#9aa89f" font-family="Georgia, serif" font-size="22">Durable async agent loops - local-first - Python 3.11+</text>
  <g font-family="ui-monospace, Menlo, monospace" font-size="15" font-weight="600">
    <g transform="translate(220 200)">
      <rect x="0" y="0" width="190" height="52" rx="8" fill="#171a18" stroke="#7ec8a8" stroke-width="2"/>
      <text x="95" y="32" fill="#7ec8a8" text-anchor="middle">loom-tailcalls</text>
    </g>
    <text x="430" y="232" fill="#a68437" font-size="22">&gt;</text>
    <g transform="translate(460 200)">
      <rect x="0" y="0" width="170" height="52" rx="8" fill="#171a18" stroke="#d4a853" stroke-width="2"/>
      <text x="85" y="32" fill="#d4a853" text-anchor="middle">loom-runner</text>
    </g>
    <text x="650" y="232" fill="#a68437" font-size="22">&gt;</text>
    <g transform="translate(680 200)">
      <rect x="0" y="0" width="160" height="52" rx="8" fill="#171a18" stroke="#7ec8a8" stroke-width="2"/>
      <text x="80" y="32" fill="#7ec8a8" text-anchor="middle">flow-xray</text>
    </g>
    <text x="860" y="232" fill="#a68437" font-size="22">&gt;</text>
    <g transform="translate(890 200)">
      <rect x="0" y="0" width="150" height="52" rx="8" fill="#171a18" stroke="#d4a853" stroke-width="2"/>
      <text x="75" y="32" fill="#d4a853" text-anchor="middle">loom-run</text>
    </g>
  </g>
  <text x="1240" y="300" fill="#9aa89f" font-family="ui-monospace, monospace" font-size="14" text-anchor="end">kroq86.github.io/loom-stack</text>
</svg>
